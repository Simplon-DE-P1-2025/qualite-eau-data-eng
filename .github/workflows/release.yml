name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # pour créer les tags et releases
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # ⚠️ obligatoire — semantic-release lit tout l'historique git

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Si tu veux publier sur npm en plus :
          # NPM_TOKEN: ${{ secrets.NPM_TOKEN }}